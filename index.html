<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Exclusive Decor Sevilla</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="app-container">
        
        <section id="vista-inicio" class="vista">
            <!-- Botón Home -->
            <div id="boton-home" class="oculto" onclick="volverAlInicio()">
                <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </div>

            <div id="logo-container">
                <img src="img/logo_vertical.png" alt="Logo" class="logo-grande logo-v active">
                <img src="img/logo_horizontal.png" alt="Logo" class="logo-grande logo-h">
            </div>

            <div class="menu-categorias">
                <button onclick="navegar('madera', this)">Madera</button>
                <button onclick="navegar('textil', this)">Textil</button>
                <button onclick="navegar('aromas', this)">Aromas</button>
                <button onclick="navegar('menaje', this)">Menaje</button>
                <button onclick="navegar('lamparas', this)">Lámparas</button>
            </div>
        </section>

        <section id="vista-galeria" class="vista oculto">
            <!-- Boton Anterior -->
            <div id="retroceder-pagina" onclick="retrocederProducto()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
                <span>Anterior</span>
            </div>
            
            <!-- AQUÍ SE CARGA EL PRODUCTO -->
            <div id="visor-producto"></div>

            <!-- Boton Siguiente -->
            <div id="pasar-pagina" onclick="siguienteProducto()">
                <span>Siguiente</span>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
            </div>
        </section>

    </div>

    <script src="main.js"></script>
</body>
</html>
